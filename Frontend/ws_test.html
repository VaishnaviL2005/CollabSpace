<!DOCTYPE html>
<html>
<head>
  <title>CollabSpace WebSocket Test</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; }
    input, button { padding: 8px; margin-top: 5px; width: 100%; }
  </style>
</head>
<body>

<h2>CollabSpace WebSocket Test</h2>

<label>Chat ID</label>
<input id="chatId" />

<label>JWT Token</label>
<input id="token" />

<button onclick="connect()">Connect</button>

<hr>

<div id="messages"></div>

<input id="messageInput" placeholder="Type a message" />
<button onclick="sendMessage()">Send</button>

<script>
  let socket = null;

  async function connect() {
    const chatId = document.getElementById("chatId").value;
    const token = document.getElementById("token").value;

    if (!chatId || !token) {
      alert("Chat ID and Token required");
      return;
    }

    // 1️⃣ Load previous messages FIRST
    await loadHistory(chatId, token);

    // 2️⃣ Open WebSocket for live messages
    socket = new WebSocket(
      `ws://127.0.0.1:8000/ws/chat/${chatId}?token=${token}`
    );

    socket.onopen = () => log("🟢 Connected");

    socket.onmessage = (event) => {
      const data = JSON.parse(event.data);
      log(`👤 ${data.username}: ${data.message}`);
    };

    socket.onclose = () => log("🔴 Disconnected");
  }

  async function loadHistory(chatId, token) {
    const res = await fetch(
      `http://127.0.0.1:8000/messages/${chatId}`,
      {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      }
    );

    const messages = await res.json();

    messages.forEach(msg => {
      log(`👤 ${msg.sender_id}: ${msg.content}`);
    });
  }

  function sendMessage() {
    const input = document.getElementById("messageInput");
    const msg = input.value.trim();
    if (!msg || !socket) return;

    socket.send(msg);
    input.value = "";
  }

  function log(text) {
    const box = document.getElementById("messages");
    const div = document.createElement("div");
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
</script>


</body>
</html>
